name: Security Checks

on:
  push:
    branches:
      - patch/**
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto